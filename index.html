<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dra. Ana Beatriz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<style>
:root{
  --bg:#FFF2E1;
  --primary:#A79277;
  --text:#1a1a1a;
  --text-soft:#6a6a6a;
  --surface:rgba(255,255,255,0.5);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{max-width:1120px;margin:auto;padding:0 24px}

header{
  position:fixed;width:100%;z-index:20;
  backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.4);
}

nav{display:flex;justify-content:space-between;padding:16px 0}

.hero{min-height:100vh;display:flex;align-items:center}

h1{
  font-size:64px;
  line-height:1.05;
  letter-spacing:-1px;
  background:linear-gradient(to bottom,#fff,#aaa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

h2{font-weight:400;margin-top:16px;color:var(--text-soft);max-width:520px}

.btn{
  margin-top:32px;padding:16px 32px;border-radius:14px;border:none;
  background:var(--primary);color:white;cursor:pointer;position:relative;overflow:hidden;
  transition:all .3s ease;
}

.btn:hover{transform:scale(1.03)}

.btn::after{
  content:'';position:absolute;width:200%;height:100%;top:0;left:-100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);
  animation:shine 4s infinite;
}

@keyframes shine{to{left:100%}}

.section{padding:120px 0}

.grid{display:grid;gap:24px}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}

.card{
  padding:32px;border-radius:16px;background:white;
  transition:all .35s cubic-bezier(.22,1,.36,1);
}

.cards:hover .card{filter:blur(3px);opacity:.7}
.cards .card:hover{filter:none;opacity:1;transform:scale(1.04)}

.reveal{opacity:0;transform:translateY(40px);filter:blur(10px)}

.swiper{overflow:hidden}
.swiper-wrapper{transition-timing-function:linear !important}
.swiper-slide{width:auto;padding-right:40px;color:var(--text-soft)}

footer{padding:80px 0;text-align:center;color:var(--text-soft)}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:#00cfff;border-radius:10px}

.particle{
  position:fixed;width:6px;height:6px;border-radius:50%;
  background:radial-gradient(circle,#00eaff,#0088ff);
  opacity:.4;filter:blur(2px);
  animation:float linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) translateX(0)}
  50%{transform:translateY(40vh) translateX(40px)}
  100%{transform:translateY(-10vh) translateX(-20px)}
}

@media(max-width:768px){
  h1{font-size:42px}
}
</style>
</head>

<body>
<header>
  <div class="container">
    <nav>
      <div>LOGO</div>
      <div>Contato</div>
    </nav>
  </div>
</header>

<section class="hero container">
  <div>
    <h1 class="reveal">Você não precisa enfrentar seus desafios sozinha.</h1>
    <h2 class="reveal">Atendimento online e presencial com sigilo, empatia e embasamento científico.</h2>
    <button class="btn reveal">QUERO ME CONHECER MELHOR</button>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">Confiança</div>
        <div class="swiper-slide">Empatia</div>
        <div class="swiper-slide">Sigilo</div>
        <div class="swiper-slide">Ciência</div>
      </div>
    </div>
  </div>
</section>

<section class="section container">
  <div class="grid grid-3 cards">
    <div class="card reveal">Autoconhecimento</div>
    <div class="card reveal">Ansiedade</div>
    <div class="card reveal">Relacionamentos</div>
  </div>
</section>

<footer>
  © Dra. Ana Beatriz
</footer>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.6/bundled/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const lenis=new Lenis({smooth:true});
function raf(t){lenis.raf(t);requestAnimationFrame(raf)}requestAnimationFrame(raf);

// HERO TIMELINE
const tl=gsap.timeline();
tl.to('.hero h1',{opacity:1,y:0,filter:'blur(0)',duration:1,ease:'expo.out'})
  .to('.hero h2',{opacity:1,y:0,filter:'blur(0)',duration:1},'-=0.6')
  .to('.hero .btn',{opacity:1,y:0,scale:1,duration:.8},'-=0.6');

// REVEAL
const observer=new IntersectionObserver(entries=>{
  entries.forEach((e,i)=>{
    if(e.isIntersecting){
      gsap.to(e.target,{opacity:1,y:0,filter:'blur(0)',duration:1,delay:i*0.08,ease:'power3.out'})
    }
  })
},{threshold:0.2});

document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

// SWIPER MARQUEE
new Swiper('.swiper',{
  slidesPerView:'auto',
  loop:true,
  speed:4000,
  allowTouchMove:false,
  autoplay:{delay:0,disableOnInteraction:false}
});

// PARTICLES
for(let i=0;i<40;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=8+Math.random()*10+'s';
  document.body.appendChild(p);
}
</script>

</body>
</html>
